services:
  - type: web
    name: eva-speak-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: EVA_MODEL_SIZE
        value: tiny.en
      - key: EVA_ANALYSIS_TIMEOUT_MS
        value: "900000"
      - key: EVA_WHISPER_BEAM_SIZE
        value: "1"
      - key: EVA_WHISPER_VAD_FILTER
        value: "false"
      - key: EVA_VISION_SAMPLE_FPS
        value: "0.5"
      - key: EVA_VISION_MAX_WIDTH
        value: "480"
      - key: EVA_VISION_REFINE_LANDMARKS
        value: "false"
      - key: EVA_RATE_LIMIT
        value: "20"
      - key: EVA_RATE_WINDOW_MS
        value: "600000"
      - key: EVA_ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
